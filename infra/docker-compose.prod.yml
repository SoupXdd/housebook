services:
  postgres:
    image: postgres:16
    container_name: housebook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-housebook}
      POSTGRES_USER: ${POSTGRES_USER:-housebook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-housebook}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - housebook_pgdata:/var/lib/postgresql/data
    networks:
      - housebook-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-housebook} -d ${POSTGRES_DB:-housebook}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: housebook-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-housebook}:${POSTGRES_PASSWORD:-housebook}@postgres:5432/${POSTGRES_DB:-housebook}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,https://yourdomain.com}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-30d}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - housebook-network

volumes:
  housebook_pgdata:

networks:
  housebook-network:
    driver: bridge
